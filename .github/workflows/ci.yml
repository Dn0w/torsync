name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build ./...
